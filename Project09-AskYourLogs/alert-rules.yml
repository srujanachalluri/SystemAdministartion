# alert-rules.yml — Medium Tier: SLO + burn-rate alert (extra credit)
#
# To activate: add this line under `rule_files:` in prometheus.yml
#     rule_files:
#       - /etc/prometheus/alert-rules.yml
# and mount this file into the prometheus container, then restart.
#
# SLO: 99.9% of checkout requests succeed over a 30-day window.
#   Error budget = 0.1% of requests. Over 30 days that budget is roughly
#   43 minutes of "all requests failing" equivalent. We alert on how FAST we
#   are burning that budget (a symptom-based, burn-rate alert), NOT on a raw
#   error count. Alerting on a count pages you for a single harmless blip;
#   alerting on burn rate pages you only when the month's budget is genuinely
#   at risk — which is what avoids alert fatigue.

groups:
  - name: checkout-slo
    rules:
      # Fast burn: over the last 5 minutes we are burning the 30-day error
      # budget 14.4x faster than sustainable. At 14.4x, a 30-day budget is gone
      # in ~2 days — this is a "wake someone up" page.
      - alert: CheckoutErrorBudgetFastBurn
        expr: |
          (
            sum(rate(prometheus_http_requests_total{code=~"5.."}[5m]))
            /
            sum(rate(prometheus_http_requests_total[5m]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "Checkout error budget burning fast (>14.4x)"
          description: >
            The 5m error ratio implies we will exhaust the 30-day 99.9% error
            budget in about 2 days. This is a symptom-based page: it fires on
            the rate we are burning budget, not on a raw error count.
